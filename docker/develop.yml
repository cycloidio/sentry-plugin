services:
  sentry_plugin:
    image: golang:1.25.1 
    ports:
      - '4000:4000'
    volumes:
      - ..:/go/src/sentry_plugin
      - $GOPATH/pkg/mod:/go/pkg/mod
      - $GOCACHE:/root/.cache/go-build
    working_dir: /go/src/sentry_plugin
    environment:
      - PORT=4000
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root123
      - DB_NAME=sentry_plugin_develop
      - DB_FILE=db.db
