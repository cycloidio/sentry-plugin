- type: table
  placement:
    type: component
    config:
      tab_name: Sentry
  widget:
    query: >
      SELECT i.title, i.permalink, i.has_seen, i.status
      FROM issues AS i
      JOIN projects AS p
        ON p.id = i.project_id
      JOIN organizations AS o
        ON o.id = p.organization_id
    relations:
      - name: "Project Slug"
        decription: "The project in which the Sentry instance is scoped,\nif none is provided then all the projects will be imported"
        selector: "p.slug"
      - name: "Organization Slug"
        description: "The organization in which the Sentry instance is scoped,\nif none is provided then all the organizations will be imported"
        selector: "o.slug"
    columns:
      - value: title
        title: Title
        type: string
      - value: permalink
        title: Permalink
        type: string
      - value: has_seen
        title: Has Seen
        type: boolean
      - value: status
        title: Status
        type: string
